name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          notes_file="RELEASE_NOTES_${TAG_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            notes_file=""
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" main.js manifest.json styles.css --clobber
          elif [ -n "$notes_file" ]; then
            gh release create "$TAG_NAME" main.js manifest.json styles.css --title "$TAG_NAME" --notes-file "$notes_file" --verify-tag
          else
            gh release create "$TAG_NAME" main.js manifest.json styles.css --title "$TAG_NAME" --generate-notes --verify-tag
          fi
